# Manually triggered job to build and push the A2 (Dockerfile) and A3
# (Dockerfile.a3) images against a specific vLLM tag/commit. The VLLM_TAG
# build-arg defaults to v0.23.0 and can be overridden at dispatch time.
#
# Each image is built natively on per-arch runners (amd64 + arm64) and pushed
# to a per-arch tag, then merged into a single multi-arch manifest. Per-arch
# tags are used (instead of push-by-digest) because Quay garbage-collects
# untagged digests, which can race with the slow Ascend builds and break the
# merge. Images are pushed to quay.io/fayeomni/vllm-ascend with tags shaped as
# <vllm_tag/commit>-<vllm_ascend_tag/commit>[ -<suffix> ], e.g.
#   v0.23.0-v0.10.0       (A2, multi-arch)
#   v0.23.0-v0.10.0-a3    (A3, multi-arch)
name: Manual image build (VLLM_TAG)

on:
  workflow_dispatch:
    inputs:
      vllm_tag:
        description: 'vLLM tag/commit to build against (VLLM_TAG build-arg)'
        required: true
        type: string
        default: 'v0.23.0'

permissions:
  contents: read

env:
  QUAY_REPO: quay.io/fayeomni/vllm-ascend

jobs:
  prep:
    name: Resolve image tag
    runs-on: ubuntu-latest
    outputs:
      tag_base: ${{ steps.tag.outputs.tag_base }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag base (<vllm_tag>-<vllm_ascend_ref>)
        id: tag
        env:
          VLLM_TAG: ${{ inputs.vllm_tag }}
        run: |
          # Prefer an exact tag pointing at HEAD, otherwise fall back to the
          # short commit SHA.
          REF=$(git describe --tags --exact-match 2>/dev/null || git rev-parse --short HEAD)
          echo "tag_base=${VLLM_TAG}-${REF}" >> "$GITHUB_OUTPUT"

  build-push:
    name: Build ${{ matrix.build_meta.name }} (${{ matrix.arch.tag }})
    runs-on: ${{ matrix.arch.runner }}
    needs: prep
    strategy:
      fail-fast: false
      matrix:
        build_meta:
          - name: A2 Ubuntu
            dockerfile: Dockerfile
            suffix: ''
          - name: A3 Ubuntu
            dockerfile: Dockerfile.a3
            suffix: '-a3'
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
            tag: amd64
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
            tag: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free up disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          docker-images: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ vars.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push per-arch tag
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.build_meta.dockerfile }}
          platforms: ${{ matrix.arch.platform }}
          push: true
          provenance: false
          tags: ${{ env.QUAY_REPO }}:${{ needs.prep.outputs.tag_base }}${{ matrix.build_meta.suffix }}-${{ matrix.arch.tag }}
          build-args: |
            VLLM_TAG=${{ inputs.vllm_tag }}

  merge-image:
    name: Merge ${{ matrix.build_meta.name }} multi-arch image
    runs-on: ubuntu-latest
    needs: [prep, build-push]
    strategy:
      fail-fast: false
      matrix:
        build_meta:
          - name: A2 Ubuntu
            suffix: ''
          - name: A3 Ubuntu
            suffix: '-a3'
    steps:
      - name: Login to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ vars.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Merge and push multi-arch image
        env:
          BASE: ${{ env.QUAY_REPO }}:${{ needs.prep.outputs.tag_base }}${{ matrix.build_meta.suffix }}
        run: |
          docker buildx imagetools create -t "${BASE}" \
            "${BASE}-amd64" \
            "${BASE}-arm64"
          docker buildx imagetools inspect "${BASE}"
